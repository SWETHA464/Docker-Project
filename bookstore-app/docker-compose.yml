services:
  db:
    # MariaDB is a much smaller download than mysql:8.0 and is fully wire-compatible --
    # the mysql2 driver, init.sql, and every query in this project work unchanged.
    image: mariadb:10.11
    container_name: bookstore_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: book_db
      MARIADB_USER: book_user
      MARIADB_PASSWORD: book_pass
    ports:
      - "3306:3306"
    volumes:
      - bookstore_db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: bookstore_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: book_user
      DB_PASSWORD: book_pass
      DB_NAME: book_db
      JWT_SECRET: super_secret_change_me
      PORT: 5000
      ADMIN_DEFAULT_USERNAME: admin
      ADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: bookstore_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  bookstore_db_data:
